name: Auto Releases

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      # does checkouts whatever those are
      - uses: actions/checkout@v4

      # remove unused software
      - name: remove unused
        run: |
          sudo apt remove firefox php8.3* 
          

      # update & upgrade
      - name: update && upgrade
        run: |
          sudo apt update && sudo apt upgrade
          

      - name: Install system dependencies
        run: |
          sudo apt-get install -y build-essential ccache python3 python3-pip ninja-build libglm-dev libsdl2-dev libgl-dev libglu1-mesa-dev libpthread-stubs0-dev
          python -m pip install meson
          # Set a reasonable ccache size
          ccache -M 5G || true
          
          
      - name: clone 4jcraft
        run: |
          git clone https://github.com/4jcraft/4jcraft.git

      - name: cd > do build dir with meson > do compily compily
        run: |
          cd 4jcraft
          
          meson setup build
          
          meson compile -C build

      - name: do packaging
        run: |
          ls
          cd 4jcraft/build
          echo cd Minecraft.Client > Minecraft.sh
          echo ./Minecraft.Client >> Minecraft.sh
          cd ..
          mkdir 4jcraft-bin
          cp -r build/* 4jcraft-bin
          7z a -r release.7z "4jcraft-bin/"
          mkdir artifact
          mv release.7z artifact

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release.7z
          path: 4jcraft/artifact
          
  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v7
      with:
        path: artifacts
        
    - name: Get current date
      run: echo "CURRENT_DATE=$(date +'%Y%m%dT%H%M%S')" >> $GITHUB_ENV

    - name: Update release
      uses: andelf/nightly-release@main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ env.CURRENT_DATE }}
        prerelease: false
        name: Release-${{ env.CURRENT_DATE }}
        body: |
          yuri.
          
          # 🚨 looking for binary? 🚨
          root/Minecraft.Client/Minecraft.Client

          but theres a sh script called Minecraft.sh for convinience c:
        files: |
          artifacts/*

  cleanup:
    needs: [build, release]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Cleanup artifacts
      uses: geekyeggo/delete-artifact@v5
      with:
        name: build-*
